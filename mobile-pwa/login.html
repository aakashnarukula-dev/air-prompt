<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Air Prompt — Sign in</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0b0b0f;
        --surface: #14141b;
        --border: rgba(255, 255, 255, 0.06);
        --text: #f2f2f5;
        --muted: #8b8b96;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; height: 100%; }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
        display: grid;
        place-items: center;
        min-height: 100vh;
      }
      .card {
        width: min(92vw, 320px);
        padding: 32px 28px;
        text-align: center;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 22px;
        font-weight: 600;
        letter-spacing: -0.02em;
      }
      p.sub {
        margin: 0 0 24px;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.5;
      }
      button {
        display: inline-flex; align-items: center; justify-content: center; gap: 10px;
        width: 100%;
        padding: 12px 16px;
        background: #1f1f29;
        color: var(--text);
        border: 1px solid var(--border);
        border-radius: 12px;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        transition: background 120ms ease;
      }
      button:hover { background: #262632; }
      button:active { background: #1a1a22; }
      .icon { width: 18px; height: 18px; }
      #status {
        margin-top: 20px;
        font-size: 13px;
        line-height: 1.5;
        color: var(--muted);
      }
      #status.success { color: #86efac; }
      #status.error { color: #fca5a5; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Sign in to Air Prompt</h1>
      <p class="sub">Continue with Google to pair your widget.</p>
      <button data-provider="google">
        <svg class="icon" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.3 0 6.3 1.2 8.6 3.2l6.3-6.3C35.3 3.2 30 1 24 1 14.8 1 7 6.5 3.4 14.3l7.3 5.7C12.5 13.9 17.8 9.5 24 9.5z"/><path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v9h12.7c-.6 3.1-2.2 5.7-4.7 7.4l7.2 5.6c4.2-3.9 6.3-9.7 6.3-17.5z"/><path fill="#FBBC05" d="M10.7 28.2c-.5-1.6-.8-3.3-.8-5.2s.3-3.6.8-5.2l-7.3-5.7C1.8 15.3.5 19.5.5 23c0 3.5 1.3 7.7 2.9 10.9l7.3-5.7z"/><path fill="#34A853" d="M24 46c6 0 11.3-2 15.2-5.5l-7.2-5.6c-2 1.3-4.5 2.1-8 2.1-6.2 0-11.5-4.4-13.3-10.5l-7.3 5.7C7 41.5 14.8 46 24 46z"/></svg>
        Continue with Google
      </button>
      <div id="status"></div>
    </div>
    <script type="module" src="/src/login.ts"></script>
  </body>
</html>
